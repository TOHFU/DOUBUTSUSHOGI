<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Visual Regression Report</title>
    <style>
      :root {
        color-scheme: light dark;
        --bg: #f6f7f9;
        --card: #ffffff;
        --text: #172033;
        --muted: #5b6475;
        --border: #d8dee8;
        --passed: #0f766e;
        --failed: #b42318;
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #0f141d;
          --card: #171d27;
          --text: #edf2f7;
          --muted: #9aa4b2;
          --border: #2a3342;
        }
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: var(--bg);
        color: var(--text);
        font-family: Inter, system-ui, sans-serif;
        line-height: 1.5;
      }

      main {
        max-width: 1200px;
        margin: 0 auto;
        padding: 32px 20px 48px;
      }

      .hero {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 16px;
        padding: 24px;
        margin-bottom: 24px;
      }

      .hero h1 {
        margin: 0 0 8px;
        font-size: 1.75rem;
      }

      .hero p {
        margin: 0;
        color: var(--muted);
      }

      .summary {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        margin-top: 20px;
      }

      .summary-item {
        border: 1px solid var(--border);
        border-radius: 999px;
        padding: 6px 12px;
        font-size: 0.95rem;
      }

      .case {
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 16px;
        padding: 20px;
        margin-bottom: 20px;
      }

      .case-header {
        display: flex;
        justify-content: space-between;
        gap: 16px;
        align-items: start;
        margin-bottom: 16px;
      }

      .case-header h2 {
        margin: 0;
        font-size: 1.1rem;
      }

      .case-meta {
        margin: 4px 0 0;
        color: var(--muted);
        font-size: 0.92rem;
      }

      .status {
        border-radius: 999px;
        padding: 4px 10px;
        font-size: 0.85rem;
        font-weight: 600;
        white-space: nowrap;
      }

      .status-passed {
        background: rgb(15 118 110 / 0.12);
        color: var(--passed);
      }

      .status-failed {
        background: rgb(180 35 24 / 0.12);
        color: var(--failed);
      }

      .panel-grid {
        display: grid;
        gap: 16px;
        grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      }

      .panel-grid--single {
        grid-template-columns: minmax(240px, 390px);
      }

      .panel {
        margin: 0;
        border: 1px solid var(--border);
        border-radius: 12px;
        overflow: hidden;
        background: #fff;
      }

      .panel figcaption {
        padding: 8px 12px;
        font-size: 0.85rem;
        color: var(--muted);
        border-bottom: 1px solid var(--border);
      }

      .panel img {
        display: block;
        width: 100%;
        height: auto;
      }
    </style>
  </head>
  <body>
    <main>
      <section class="hero">
        <h1>All visual regression checks passed</h1>
        <p>Generated at 2026-06-19T08:23:59.470Z</p>
        <div class="summary">
          <span class="summary-item">Total: 1</span>
          <span class="summary-item">Passed: 1</span>
          <span class="summary-item">Failed: 0</span>
        </div>
      </section>
      <section class="case" id="case-1">
    <header class="case-header">
      <div>
        <h2>HomePage.visual.test.tsx</h2>
        <p class="case-meta">menu-screen-chromium-linux</p>
      </div>
      <span class="status status-passed">Passed</span>
    </header>
    <div class="panel-grid panel-grid--single">
      <figure class="panel">
      <figcaption>Baseline</figcaption>
      <img src="images/HomePage-visual-test-tsx-menu-screen-chromium-linux-reference.png" alt="Baseline screenshot for menu-screen-chromium-linux" loading="lazy" />
    </figure>
    </div>
  </section>
    </main>
  </body>
</html>
